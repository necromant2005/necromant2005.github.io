<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>
      {% if page.title and page.title != site.title %}
        {{ page.title }} | {{ site.title }}
      {% else %}
        {{ site.title }}
      {% endif %}
    </title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | normalize_whitespace }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body class="">
    <nav class="navbar navbar-light" role="navigation">
        <div class="container">
            <div class="navbar-header mx-auto">
                <a class="navbar-brand  fs-1" href="/">{{ site.title }}</a>
            </div>
        </div>
    </nav>

    <menu class="container">
      <nav class="nav nav-underline justify-content-between bg-light">
        <a class="nav-item nav-link link-body-emphasis fs-2 px-4" href="{{ '/dev/' | relative_url }}">Dev</a>
        <a class="nav-item nav-link link-body-emphasis fs-2 px-4" href="{{ '/management/' | relative_url }}">Management</a>
        <a class="nav-item nav-link link-body-emphasis fs-2 px-4" href="{{ '/analytics/' | relative_url }}">Analytics</a>
        <a class="nav-item nav-link link-body-emphasis fs-2 px-4" href="{{ '/other/' | relative_url }}">Other</a>
      </nav>
    </menu>

    <main class="container py-4">
      {{ content }}
    </main>

    <footer class="border-top bg-white py-4">
      <div class="container d-flex flex-column flex-md-row justify-content-between gap-2 text-body-secondary small">
        <p class="mb-0">{{ site.description }}</p>
        <p class="mb-0">&copy; {{ 'now' | date: '%Y' }} {{ site.author.name }}</p>
      </div>
    </footer>
  </body>
</html>
