---
layout: default
---
<article class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <p class="text-uppercase small fw-semibold text-body-secondary mb-3">{{ page.date | date: '%B %-d, %Y' }}</p>
        <h1 class="display-5 fw-bold mb-3">{{ page.title }}</h1>
        {% if page.description %}
          <p class="lead text-body-secondary mb-4">{{ page.description }}</p>
        {% endif %}
        <div class="bg-white rounded-4 shadow-sm p-4 p-lg-5">
          {{ content }}
        </div>
      </div>
    </div>
  </div>
</article>
